<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="quiz-container">
        <!-- CATEGORY & SETTINGS SCREEN -->
        <div id="setup-screen">
            <div class="setup-header">
                <i class="fas fa-cog"></i>
                <h1>Quiz Master</h1>
            </div>
            <p class="setup-subtitle">Choose your challenge</p>
            
            <!-- CATEGORY SELECTOR -->
            <div class="category-section">
                <h3><i class="fas fa-tags"></i> Category</h3>
                <div class="category-buttons" id="category-buttons">
                    <button class="cat-btn" data-category="general">
                        <i class="fas fa-globe"></i> General
                    </button>
                    <button class="cat-btn" data-category="sports">
                        <i class="fas fa-futbol"></i> Sports
                    </button>
                    <button class="cat-btn" data-category="entertainment">
                        <i class="fas fa-film"></i> Entertainment
                    </button>
                    <button class="cat-btn" data-category="programming">
                        <i class="fas fa-code"></i> Programming
                    </button>
                </div>
            </div>

            <!-- QUESTION COUNT -->
            <div class="setting-section">
                <h3><i class="fas fa-question"></i> Questions</h3>
                <div class="setting-buttons" id="question-count">
                    <button class="setting-btn" data-questions="5">5</button>
                    <button class="setting-btn" data-questions="10">10</button>
                    <button class="setting-btn" data-questions="20">20</button>
                </div>
            </div>

            <!-- TIME PER QUESTION -->
            <div class="setting-section">
                <h3><i class="fas fa-clock"></i> Time</h3>
                <div class="setting-buttons" id="time-selector">
                    <button class="setting-btn" data-time="5">5s</button>
                    <button class="setting-btn" data-time="10">10s</button>
                    <button class="setting-btn" data-time="15">15s</button>
                    <button class="setting-btn" data-time="20">20s</button>
                </div>
            </div>

            <button id="start-btn" class="start-btn">
             <i class="fas fa-rocket"></i> Start Quiz
            </button>
               <p id="selection-warning" class="selection-warning hidden">
               <i class="fas fa-exclamation-circle"></i> Please select a category, number of questions, and time first!
               </p>
        </div>

        <!-- Welcome Screen (Hidden Initially) -->
        <div id="welcome-screen" class="hidden">
            <div class="welcome-header">
                <i class="fas fa-brain"></i>
                <h1 id="quiz-title">Quiz Ready!</h1>
            </div>
            <p class="welcome-subtitle" id="quiz-subtitle"></p>
            <div class="welcome-stats">
                <span id="stat-questions"><i class="fas fa-question"></i> Loading...</span>
                <span id="stat-time"><i class="fas fa-clock"></i> Loading...</span>
                <span><i class="fas fa-star"></i> 80%+ = Pro</span>
            </div>
            <p class="motivation">💡 Wrong answers? Perfect learning opportunity!</p>
        </div>

        <!-- Quiz Header -->
        <div id="quiz-header" class="hidden">
            <div class="timer">
                <i class="fas fa-clock"></i> <span id="timer">20</span>s
            </div>
            <div class="progress-bar">
                <div id="progress"></div>
            </div>
            <div class="score">
                <i class="fas fa-trophy"></i> <span id="current-score">0</span>/<span id="total-questions"></span>
            </div>
        </div>

        <!-- Questions -->
        <div id="question-container" class="hidden">
            <h2 id="question"></h2>
            <div id="answer-buttons" class="answer-buttons-container"></div>
            <button id="next-btn" class="next-btn hidden">
                <i class="fas fa-arrow-right"></i> Next
            </button>
        </div>

        <!-- Results -->
        <div id="result-container" class="hidden">
            <i class="fas fa-crown result-icon"></i>
            <h2>Final Score: <span id="final-score"></span></h2>
            <div id="percentage" class="percentage"></div>
            <p id="message"></p>
            <button id="restart-btn" class="restart-btn">
                <i class="fas fa-redo"></i> Play Again
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
